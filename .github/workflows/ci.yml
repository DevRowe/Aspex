name: CI

on:
  push:
  pull_request:

jobs:
  bun:
    name: Bun checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Lint
        run: bun run lint

      # Card 21 CI is scoped to Bun typecheck/test/lint. Tauri packaging checks
      # require a Rust/native desktop build matrix and are intentionally separate.
